services:
  - type: web
    name: chassisfind
    env: python
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: gunicorn real_data_scraper:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production

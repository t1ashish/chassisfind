<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChassisFind — Real-Time Chassis Availability</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
.header{background:linear-gradient(135deg,#1a2744 0%,#0f1e3d 100%);padding:24px 20px;border-bottom:1px solid #1e3a5f}
.header-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.logo{font-size:22px;font-weight:700;color:#38bdf8;letter-spacing:-0.5px}
.logo span{color:#94a3b8;font-size:13px;font-weight:400;display:block;margin-top:2px}
.source-badges{display:flex;flex-wrap:wrap;gap:6px}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid}
.badge-dcli{background:#0c2a1a;color:#4ade80;border-color:#166534}
.badge-trac{background:#0c1f3a;color:#60a5fa;border-color:#1e3a5f}
.badge-pop{background:#2d1b00;color:#fb923c;border-color:#92400e}
.badge-bts{background:#1a1a2e;color:#a78bfa;border-color:#4c1d95}
.badge-driver{background:#1f0a2e;color:#f472b6;border-color:#831843}
.stats-bar{background:#151c2c;padding:10px 20px;border-bottom:1px solid #1e3a5f}
.stats-inner{max-width:960px;margin:0 auto;display:flex;gap:24px;flex-wrap:wrap}
.stat{font-size:12px;color:#94a3b8}.stat strong{color:#e2e8f0;font-size:14px}
.main{max-width:960px;margin:0 auto;padding:20px}
.search-card{background:#151c2c;border:1px solid #1e3a5f;border-radius:12px;padding:20px;margin-bottom:16px}
.search-row{display:flex;gap:10px;flex-wrap:wrap}
.search-input{flex:1;min-width:200px;padding:10px 14px;background:#0f1117;border:1px solid #1e3a5f;border-radius:8px;color:#e2e8f0;font-size:14px;outline:none}
.search-input:focus{border-color:#38bdf8}
.search-input::placeholder{color:#4a5568}
select{padding:10px 14px;background:#0f1117;border:1px solid #1e3a5f;border-radius:8px;color:#e2e8f0;font-size:13px;cursor:pointer}
.btn{padding:10px 20px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-primary{background:#2563eb;color:#fff}.btn-primary:hover{background:#1d4ed8}
.btn-report{background:#7c3aed;color:#fff;font-size:13px}.btn-report:hover{background:#6d28d9}
.btn-scrape{background:#0f4c2a;color:#4ade80;font-size:12px;border:1px solid #166534}.btn-scrape:hover{background:#166534}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:center}
.filter-row label{font-size:12px;color:#94a3b8;white-space:nowrap}
.results-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.results-count{font-size:13px;color:#94a3b8}
.card{background:#151c2c;border:1px solid #1e3a5f;border-radius:10px;padding:16px;margin-bottom:10px;transition:border-color .15s}
.card:hover{border-color:#2563eb}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap}
.terminal-name{font-size:15px;font-weight:600;color:#e2e8f0;margin-bottom:3px}
.terminal-meta{font-size:12px;color:#64748b}
.status-badge{padding:3px 12px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;flex-shrink:0}
.status-open{background:#052e16;color:#4ade80;border:1px solid #166534}
.status-limited{background:#431407;color:#fb923c;border:1px solid #9a3412}
.status-closed{background:#1c0505;color:#f87171;border:1px solid #7f1d1d}
.status-unknown{background:#1e1b4b;color:#a5b4fc;border:1px solid #3730a3}
.card-body{margin-top:10px;display:flex;gap:20px;flex-wrap:wrap}
.info-item{font-size:12px;color:#94a3b8}
.info-item strong{color:#cbd5e1;font-size:13px}
.release-code{font-family:monospace;background:#0f1117;padding:2px 8px;border-radius:4px;color:#38bdf8;font-size:12px;border:1px solid #1e3a5f}
.card-footer{margin-top:10px;padding-top:10px;border-top:1px solid #1e2a3a;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.source-tag{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500}
.source-seed{background:#1e293b;color:#94a3b8}
.source-dcli_scrape{background:#0c2a1a;color:#4ade80}
.source-trac_scrape{background:#0c1f3a;color:#60a5fa}
.source-pool_of_pools{background:#2d1b00;color:#fb923c}
.source-driver_report{background:#1f0a2e;color:#f472b6}
.source-bts_ntad{background:#1a1a2e;color:#a78bfa}
.driver-chip{font-size:11px;color:#f472b6;background:#1f0a2e;padding:2px 8px;border-radius:4px}
.kpi-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.kpi{font-size:11px;padding:2px 10px;border-radius:4px}
.kpi-good{background:#052e16;color:#4ade80}
.kpi-warn{background:#431407;color:#fb923c}
.kpi-bad{background:#1c0505;color:#f87171}
.empty{text-align:center;padding:40px;color:#4a5568}

/* Report modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#151c2c;border:1px solid #1e3a5f;border-radius:12px;padding:24px;width:100%;max-width:480px;margin:20px}
.modal h3{font-size:16px;font-weight:600;margin-bottom:16px;color:#e2e8f0}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;color:#94a3b8;margin-bottom:6px}
.form-group input, .form-group select, .form-group textarea{width:100%;padding:9px 12px;background:#0f1117;border:1px solid #1e3a5f;border-radius:8px;color:#e2e8f0;font-size:13px;resize:vertical}
.form-group textarea{height:70px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
.btn-cancel{background:transparent;color:#94a3b8;border:1px solid #1e3a5f;padding:8px 16px;border-radius:8px;cursor:pointer}
.status-radio{display:flex;gap:8px;flex-wrap:wrap}
.radio-label{padding:6px 14px;border-radius:6px;border:1px solid #1e3a5f;cursor:pointer;font-size:12px;transition:all .15s}
.radio-label.open{background:#052e16;color:#4ade80;border-color:#166534}
.radio-label.limited{background:#431407;color:#fb923c;border-color:#9a3412}
.radio-label.closed{background:#1c0505;color:#f87171;border-color:#7f1d1d}
.loading{text-align:center;padding:30px;color:#64748b}
.last-updated{font-size:11px;color:#4a5568;margin-top:2px}
.provider-badge{display:inline-block;padding:1px 7px;border-radius:4px;font-size:11px;font-weight:600;margin-left:6px}
.pb-DCLI{background:#0c2a1a;color:#4ade80}.pb-TRAC{background:#0c1f3a;color:#60a5fa}
.pb-NTAD{background:#1a1a2e;color:#a78bfa}.pb-POP{background:#2d1b00;color:#fb923c}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <div class="logo">🚛 ChassisFind <span>Real-Time Intermodal Chassis Availability</span></div>
    </div>
    <div class="source-badges">
      <div class="badge badge-dcli">● DCLI Live</div>
      <div class="badge badge-trac">● TRAC Live</div>
      <div class="badge badge-pop">● Pool of Pools</div>
      <div class="badge badge-bts">● BTS/NTAD</div>
      <div class="badge badge-driver">● Driver Reports</div>
    </div>
  </div>
</div>

<div class="stats-bar">
  <div class="stats-inner" id="statsBar">
    <div class="stat"><strong id="statTerminals">—</strong> terminals tracked</div>
    <div class="stat"><strong id="statOpen">—</strong> open for pulls</div>
    <div class="stat"><strong id="statReports">—</strong> driver reports today</div>
    <div class="stat"><strong id="statSources">—</strong> data sources active</div>
  </div>
</div>

<div class="main">
  <div class="search-card">
    <div class="search-row">
      <input class="search-input" id="searchInput" placeholder="Search city, state, terminal name, or region…" autocomplete="off">
      <select id="providerFilter">
        <option value="all">All Providers</option>
        <option value="DCLI">DCLI</option>
        <option value="TRAC">TRAC</option>
        <option value="NTAD">BTS/NTAD</option>
      </select>
      <select id="regionFilter">
        <option value="all">All Regions</option>
        <option value="northeast">Northeast</option>
        <option value="southeast">Southeast</option>
        <option value="midwest">Midwest</option>
        <option value="gulf">Gulf</option>
        <option value="pacific-sw">Pacific SW</option>
        <option value="pacific-nw">Pacific NW</option>
      </select>
      <button class="btn btn-primary" onclick="search()">Search</button>
    </div>
    <div class="filter-row">
      <label><input type="checkbox" id="pullsOnly"> Open for Pulls Only</label>
      <select id="statusFilter" style="margin-left:8px">
        <option value="all">All Status</option>
        <option value="open">Open</option>
        <option value="limited">Limited</option>
        <option value="closed">Closed</option>
      </select>
      <button class="btn btn-report" onclick="openReportModal(null)" style="margin-left:auto">📍 Submit Driver Report</button>
      <button class="btn btn-scrape" onclick="triggerScrape()" title="Manually trigger live scrape from all sources">⟳ Refresh Data</button>
    </div>
  </div>

  <div class="results-header">
    <div class="results-count" id="resultsCount">Loading…</div>
    <div style="font-size:11px;color:#4a5568" id="lastUpdated"></div>
  </div>
  <div id="results"><div class="loading">Loading chassis data…</div></div>
</div>

<!-- Driver Report Modal -->
<div class="modal-overlay" id="reportModal">
  <div class="modal">
    <h3>📍 Submit Driver Report</h3>
    <div class="form-group">
      <label>Terminal</label>
      <select id="reportTerminalId"></select>
    </div>
    <div class="form-group">
      <label>What did you find?</label>
      <div class="status-radio">
        <label class="radio-label open" onclick="setReportStatus('open')">✅ Open — chassis available</label>
        <label class="radio-label limited" onclick="setReportStatus('limited')">⚠️ Limited — few left</label>
        <label class="radio-label closed" onclick="setReportStatus('closed')">❌ Closed / Empty</label>
      </div>
      <input type="hidden" id="reportStatus" value="open">
    </div>
    <div class="form-group">
      <label>Chassis size you needed</label>
      <select id="reportChassisSize">
        <option value="40">40ft</option>
        <option value="20">20ft</option>
        <option value="45">45ft</option>
        <option value="53">53ft domestic</option>
      </select>
    </div>
    <div class="form-group">
      <label>Wait time (minutes)</label>
      <input type="number" id="reportWait" placeholder="e.g. 15" min="0" max="480">
    </div>
    <div class="form-group">
      <label>Notes (optional)</label>
      <textarea id="reportNotes" placeholder="Gate hours, row availability, chassis condition, tips for other drivers…"></textarea>
    </div>
    <div class="form-group">
      <label>Your name (optional)</label>
      <input type="text" id="reportName" placeholder="Anonymous by default">
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeReportModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitReport()">Submit Report</button>
    </div>
  </div>
</div>

<script>
let terminalsCache = [];

async function loadStats() {
  try {
    const r = await fetch('/api/stats');
    const d = await r.json();
    document.getElementById('statTerminals').textContent = d.terminals_tracked;
    document.getElementById('statOpen').textContent = d.open_for_pulls;
    document.getElementById('statReports').textContent = d.driver_reports_today;
    const sources = Object.keys(d.data_sources || {}).filter(k => d.data_sources[k]);
    document.getElementById('statSources').textContent = sources.length || '—';
  } catch(e) {}
}

async function loadTerminals() {
  try {
    const r = await fetch('/api/terminals');
    terminalsCache = await r.json();
    const sel = document.getElementById('reportTerminalId');
    sel.innerHTML = terminalsCache.map(t =>
      `<option value="${t.id}">${t.name} — ${t.city}, ${t.state} (${t.provider})</option>`
    ).join('');
  } catch(e) {}
}

async function search() {
  const loc = document.getElementById('searchInput').value;
  const prov = document.getElementById('providerFilter').value;
  const region = document.getElementById('regionFilter').value;
  const status = document.getElementById('statusFilter').value;
  const pullsOnly = document.getElementById('pullsOnly').checked;
  const params = new URLSearchParams({
    location: loc, provider: prov, status, region,
    pulls_only: pullsOnly ? 'true' : 'false'
  });
  document.getElementById('results').innerHTML = '<div class="loading">Searching…</div>';
  try {
    const r = await fetch('/api/chassis?' + params);
    const d = await r.json();
    renderResults(d.results, d.count, d.timestamp);
  } catch(e) {
    document.getElementById('results').innerHTML = '<div class="empty">Error loading data. Check that the server is running.</div>';
  }
}

function renderResults(rows, count, ts) {
  document.getElementById('resultsCount').textContent = `${count} terminal${count !== 1 ? 's' : ''} found`;
  if (ts) document.getElementById('lastUpdated').textContent = `Updated: ${new Date(ts).toLocaleTimeString()}`;
  if (!rows.length) {
    document.getElementById('results').innerHTML = '<div class="empty">No terminals found. Try a different search term.</div>';
    return;
  }
  document.getElementById('results').innerHTML = rows.map(r => {
    const st = r.status || 'unknown';
    const provBadge = `<span class="provider-badge pb-${r.provider}">${r.provider}</span>`;
    const kpis = [];
    if (r.terminal_dwell != null) {
      const cls = r.terminal_dwell > 7 ? 'kpi-bad' : r.terminal_dwell > 4 ? 'kpi-warn' : 'kpi-good';
      kpis.push(`<span class="kpi ${cls}">Terminal dwell: ${r.terminal_dwell}d</span>`);
    }
    if (r.street_dwell != null) {
      const cls = r.street_dwell > 7 ? 'kpi-bad' : r.street_dwell > 5 ? 'kpi-warn' : 'kpi-good';
      kpis.push(`<span class="kpi ${cls}">Street dwell: ${r.street_dwell}d</span>`);
    }
    if (r.oos_ratio != null) {
      const cls = r.oos_ratio > 10 ? 'kpi-bad' : r.oos_ratio > 5 ? 'kpi-warn' : 'kpi-good';
      kpis.push(`<span class="kpi ${cls}">OOS: ${r.oos_ratio}%</span>`);
    }
    const driverInfo = r.driver_reports > 0
      ? `<span class="driver-chip">👤 ${r.driver_reports} driver report${r.driver_reports>1?'s':''} today</span>`
      : '';
    const latestDriver = r.latest_driver_status
      ? `<span class="driver-chip" title="Reported ${r.latest_driver_time}">Driver saw: ${r.latest_driver_status}</span>`
      : '';
    const src = r.data_source || 'seed';
    const srcLabel = {
      seed: 'Seed Data', dcli_scrape: 'DCLI Live', trac_scrape: 'TRAC Live',
      pool_of_pools: 'Pool of Pools', driver_report: 'Driver Report', bts_ntad: 'BTS/NTAD Gov'
    }[src] || src;
    const mapsLink = r.lat && r.lng && r.lat !== 0
      ? `<a href="https://maps.google.com/?q=${r.lat},${r.lng}" target="_blank" style="font-size:11px;color:#38bdf8;text-decoration:none">📍 Directions</a>`
      : '';
    return `<div class="card">
      <div class="card-top">
        <div>
          <div class="terminal-name">${r.terminal_name}${provBadge}</div>
          <div class="terminal-meta">${r.city || ''}${r.state ? ', '+r.state : ''}${r.pool ? ' · '+r.pool : ''}</div>
        </div>
        <span class="status-badge status-${st}">${st.toUpperCase()}</span>
      </div>
      ${kpis.length ? `<div class="kpi-row">${kpis.join('')}</div>` : ''}
      <div class="card-body">
        ${r.release_code ? `<div class="info-item"><strong>Release Code</strong><br><span class="release-code">${r.release_code}</span></div>` : ''}
        <div class="info-item"><strong>Pulls</strong><br>${r.open_for_pulls ? '✅ Open' : '❌ Closed'}</div>
        <div class="info-item"><strong>Returns</strong><br>${r.open_for_returns ? '✅ Open' : '❌ Closed'}</div>
        ${r.region ? `<div class="info-item"><strong>Region</strong><br>${r.region}</div>` : ''}
      </div>
      ${r.notes ? `<div style="margin-top:8px;font-size:12px;color:#94a3b8;line-height:1.5">${r.notes}</div>` : ''}
      <div class="card-footer">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <span class="source-tag source-${src}">${srcLabel}</span>
          ${driverInfo}${latestDriver}
        </div>
        <div style="display:flex;gap:10px;align-items:center">
          ${mapsLink}
          <button class="btn btn-report" style="padding:4px 10px;font-size:11px" onclick="openReportModal(${r.id},'${r.terminal_name.replace(/'/g,"\\'")}')">Report</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

let reportTerminalId = null;
function openReportModal(id, name) {
  reportTerminalId = id;
  if (id) {
    const sel = document.getElementById('reportTerminalId');
    for (let opt of sel.options) { if (parseInt(opt.value) === id) { opt.selected = true; break; } }
  }
  document.getElementById('reportModal').classList.add('open');
}
function closeReportModal() {
  document.getElementById('reportModal').classList.remove('open');
  reportTerminalId = null;
}
function setReportStatus(status) {
  document.getElementById('reportStatus').value = status;
  document.querySelectorAll('.status-radio .radio-label').forEach(l => l.style.opacity = '0.4');
  document.querySelector(`.status-radio .radio-label.${status}`).style.opacity = '1';
}

async function submitReport() {
  const tid = parseInt(document.getElementById('reportTerminalId').value);
  const status = document.getElementById('reportStatus').value;
  const chassis_size = document.getElementById('reportChassisSize').value;
  const wait_minutes = parseInt(document.getElementById('reportWait').value) || null;
  const notes = document.getElementById('reportNotes').value;
  const driver_name = document.getElementById('reportName').value || 'Anonymous';
  if (!tid || !status) return alert('Please select a terminal and availability status.');
  try {
    const r = await fetch('/api/report', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({terminal_id: tid, status, chassis_size, wait_minutes, notes, driver_name})
    });
    const d = await r.json();
    if (d.success) {
      closeReportModal();
      alert('✅ Report submitted! Your update helps all drivers in the network.');
      search(); loadStats();
    }
  } catch(e) { alert('Error submitting report. Please try again.'); }
}

async function triggerScrape() {
  const btn = event.target;
  btn.textContent = '⟳ Scraping…'; btn.disabled = true;
  try {
    await fetch('/api/scrape', {method:'POST'});
    btn.textContent = '✅ Done'; 
    setTimeout(() => { btn.textContent = '⟳ Refresh Data'; btn.disabled = false; }, 2000);
    search(); loadStats();
  } catch(e) {
    btn.textContent = '⟳ Refresh Data'; btn.disabled = false;
  }
}

document.getElementById('searchInput').addEventListener('keyup', e => { if (e.key === 'Enter') search(); });

// Init
loadStats();
loadTerminals();
search();
setInterval(loadStats, 60000);
</script>
</body>
</html>
